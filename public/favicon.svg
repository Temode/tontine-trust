<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Tontine Digital">
  <!-- Square background — institutional teal -->
  <rect width="64" height="64" rx="14" fill="#0B5559"/>
  <!-- Outer ring of members -->
  <g fill="#FAFAF6">
    <circle cx="49" cy="24" r="5"/>
    <circle cx="49" cy="44" r="5"/>
    <circle cx="32" cy="52" r="5"/>
    <circle cx="15" cy="44" r="5"/>
    <circle cx="15" cy="24" r="5"/>
  </g>
  <!-- Top member highlighted in champagne (next beneficiary) -->
  <circle cx="32" cy="12" r="5" fill="#B8941F"/>
  <!-- Central pot -->
  <circle cx="32" cy="32" r="9" fill="#B8941F"/>
  <circle cx="32" cy="32" r="9" fill="none" stroke="#FAFAF6" stroke-width="1.4" opacity="0.4"/>
</svg>
